<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>YTSubViewer</title>
  <link rel="stylesheet" href="/static/styles.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>

  <!-- License Overlay -->
  <div id="license-overlay" class="license-overlay" style="display:none;">
    <div class="license-overlay-card">
      <div class="license-overlay-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/><circle cx="12" cy="16" r="1"/></svg>
      </div>
      <h2>激活 YTSubViewer</h2>
      <p class="license-overlay-desc">请输入激活码以开始使用</p>
      <div class="license-overlay-field">
        <input id="license-overlay-input" class="input" type="text" placeholder="请输入激活码" autocomplete="off">
      </div>
      <button id="license-overlay-submit" class="btn btn-primary license-overlay-btn" type="button">激活</button>
      <p id="license-overlay-message" class="license-overlay-message"></p>
    </div>
  </div>

  <div class="app-layout">

    <!-- ═══ Sidebar ═══ -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2"/><path d="M7 2v20"/><path d="M17 2v20"/><path d="M2 12h20"/><path d="M2 7h5"/><path d="M2 17h5"/><path d="M17 7h5"/><path d="M17 17h5"/></svg>
          <span>YTSubViewer</span>
        </div>
        <span class="sidebar-version" id="app-version">v-</span>
      </div>

      <nav class="sidebar-nav">
        <a href="#workbench" class="nav-item active" data-section="workbench">
          <i data-lucide="layout-dashboard"></i>
          <span>工作台</span>
        </a>
        <a href="#history" class="nav-item" data-section="history">
          <i data-lucide="clock"></i>
          <span>历史</span>
        </a>
        <a href="#settings" class="nav-item" data-section="settings">
          <i data-lucide="settings"></i>
          <span>设置</span>
        </a>
        <a href="#editor" class="nav-item" data-section="editor">
          <i data-lucide="pen-line"></i>
          <span>编辑</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <select id="language-select" class="input">
          <option value="zh">中文</option>
          <option value="en">English</option>
        </select>
        <button id="refresh-button" class="btn btn-secondary" type="button" style="width:100%;">
          <i data-lucide="refresh-cw"></i> 刷新
        </button>
      </div>
    </aside>

    <!-- ═══ Main Content ═══ -->
    <main class="main-content">

      <!-- ── Page: Workbench ── -->
      <section id="workbench" class="page-section active">

        <!-- Card: URL Input -->
        <div class="card">
          <textarea id="url-input" class="textarea" placeholder="粘贴 YouTube 链接，批量时每行一个" rows="2"></textarea>
          <div style="display:flex;gap:8px;margin-top:12px;">
            <button id="analyze-button" class="btn btn-secondary" type="button"><i data-lucide="search"></i> 分析</button>
            <button id="generate-button" class="btn btn-primary" type="button"><i data-lucide="sparkles"></i> 生成字幕</button>
            <button id="queue-batch-button" class="btn btn-secondary" type="button"><i data-lucide="layers"></i> 批量</button>
          </div>
        </div>

        <!-- Card: Video Info + Task Status (side by side) -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--gap);">

          <!-- Video Info -->
          <div class="card">
            <div class="card-header">
              <h3 id="video-title">等待分析</h3>
              <img id="video-thumbnail" style="width:80px;height:45px;object-fit:cover;border-radius:8px;background:var(--color-surface);" alt="">
            </div>
            <ul style="font-size:0.82rem;color:var(--text-muted);line-height:2;">
              <li id="video-duration">时长：-</li>
              <li id="video-strategy">字幕：-</li>
              <li id="video-channel">频道：-</li>
            </ul>
          </div>

          <!-- Task Status -->
          <div class="card">
            <div class="card-header">
              <h3 id="job-status-title">准备就绪</h3>
              <span id="job-percent" class="pill">0%</span>
            </div>
            <div class="progress-bar-track">
              <div id="job-progress-bar" class="progress-bar-fill"></div>
            </div>
            <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:0.78rem;color:var(--text-muted);">
              <span id="job-stage">-</span>
              <span id="job-eta">-</span>
            </div>
            <div style="display:flex;gap:6px;margin-top:12px;">
              <button id="cancel-job-button" class="btn btn-secondary btn-icon" type="button" disabled><i data-lucide="x"></i></button>
              <button id="retry-job-button" class="btn btn-secondary btn-icon" type="button" disabled><i data-lucide="rotate-ccw"></i></button>
              <button id="refresh-job-button" class="btn btn-secondary btn-icon" type="button"><i data-lucide="refresh-cw"></i></button>
            </div>
            <p id="job-hint" class="hint">刷新页面后自动恢复任务</p>
            <div id="job-logs" style="margin-top:10px;font-size:0.82rem;color:var(--text-muted);max-height:120px;overflow-y:auto;"></div>
          </div>

        </div>

        <!-- Card: Export -->
        <div class="card">
          <div class="card-header">
            <h3>播放与导出</h3>
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;">
            <label class="checkbox-row">
              <input id="bilingual-toggle" type="checkbox">
              <span>双语</span>
            </label>
            <button id="open-player-button" class="btn btn-secondary" type="button" disabled><i data-lucide="play"></i> 播放</button>
            <button id="export-chinese-button" class="btn btn-secondary" type="button" disabled><i data-lucide="download"></i> 中文</button>
            <button id="export-bilingual-button" class="btn btn-secondary" type="button" disabled><i data-lucide="download"></i> 双语</button>
            <button id="preview-chinese-button" class="btn btn-secondary btn-icon" type="button" disabled><i data-lucide="eye"></i></button>
            <button id="preview-bilingual-button" class="btn btn-secondary btn-icon" type="button" disabled><i data-lucide="eye"></i></button>
          </div>
          <p id="player-message" class="hint">播放器和导出结果会显示在这里</p>
          <div id="downloads" style="margin-top:10px;"></div>
        </div>

        <!-- Card: Translation Settings (collapsible) -->
        <details class="card" style="cursor:pointer;">
          <summary style="font-weight:600;font-size:0.92rem;color:var(--text-main);list-style:none;display:flex;align-items:center;gap:8px;">
            <i data-lucide="sliders-horizontal" style="width:18px;height:18px;color:var(--color-primary);"></i> 翻译设置
          </summary>
          <div style="margin-top:16px;display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div>
              <label class="label" for="style-select">风格预设</label>
              <select id="style-select" class="input"></select>
            </div>
            <div>
              <label class="label" for="performance-select">性能模式</label>
              <select id="performance-select" class="input"></select>
            </div>
          </div>
          <p id="style-description" class="hint" style="margin-top:8px;">默认风格适合大多数长视频</p>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;">
            <div>
              <label class="label" for="glossary-input">术语表</label>
              <textarea id="glossary-input" class="textarea sm" placeholder="Blackwell -> Blackwell 架构"></textarea>
            </div>
            <div>
              <label class="label" for="protected-terms-input">保留词</label>
              <textarea id="protected-terms-input" class="textarea sm" placeholder="CUDA, Omniverse, Blackwell"></textarea>
            </div>
          </div>
          <div style="display:flex;gap:8px;margin-top:12px;align-items:center;">
            <label class="checkbox-row">
              <input id="creator-defaults-toggle" type="checkbox" checked>
              <span>继承频道配置</span>
            </label>
            <button id="save-profile-button" class="btn btn-secondary" type="button"><i data-lucide="bookmark"></i> 保存</button>
          </div>
          <p id="profile-status" class="hint">频道/创作者记忆会保存在本地</p>
        </details>

      </section>

      <!-- ── Page: History ── -->
      <section id="history" class="page-section">
        <div class="card">
          <div class="card-header">
            <div>
              <h3>任务历史</h3>
              <p class="hint">点击查看详情</p>
            </div>
          </div>
          <div id="history-list" style="display:flex;flex-direction:column;gap:8px;"></div>
        </div>
      </section>

      <!-- ── Page: Settings ── -->
      <section id="settings" class="page-section">

        <!-- Card: Model Config -->
        <div class="card">
          <div class="card-header">
            <h3>翻译模型</h3>
            <div style="display:flex;gap:8px;">
              <button id="test-provider-button" class="btn btn-secondary" type="button"><i data-lucide="zap"></i> 测试</button>
              <button id="save-settings-button" class="btn btn-primary" type="button"><i data-lucide="save"></i> 保存</button>
            </div>
          </div>
          <div id="preset-chips" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;"></div>
          <div style="display:grid;grid-template-columns:1.2fr 1fr 0.8fr;gap:12px;">
            <div>
              <label class="label" for="provider-url-input">API 地址</label>
              <input id="provider-url-input" class="input" type="url" placeholder="https://api.deepseek.com">
            </div>
            <div>
              <label class="label" for="api-key-input">API Key</label>
              <input id="api-key-input" class="input" type="password" placeholder="sk-...">
            </div>
            <div>
              <label class="label" for="model-input">模型</label>
              <input id="model-input" class="input" type="text" placeholder="deepseek-chat">
              <div id="model-suggestions" style="display:none;background:var(--bg-card);border-radius:var(--radius-button);box-shadow:var(--shadow-card);margin-top:4px;max-height:160px;overflow-y:auto;position:absolute;z-index:10;"></div>
            </div>
          </div>
          <p id="settings-status" class="hint" style="margin-top:12px;">等待初始化</p>
          <p id="test-result" class="hint" style="display:none;"></p>
        </div>

        <!-- Card: Environment -->
        <div class="card">
          <details style="cursor:pointer;">
            <summary style="font-weight:600;font-size:0.88rem;color:var(--text-muted);list-style:none;">环境与授权</summary>
            <div style="margin-top:12px;font-size:0.82rem;color:var(--text-muted);line-height:2;">
              <div id="data-root">数据目录：-</div>
              <div id="config-path">配置文件：-</div>
              <div id="environment-status">应用状态：-</div>
            </div>
            <div id="environment-checks" style="margin-top:8px;"></div>
            <div class="divider"></div>
            <div id="license-status" style="font-size:0.82rem;color:var(--text-muted);">授权状态加载中</div>
            <div style="display:flex;gap:8px;margin-top:8px;">
              <input id="license-input" class="input" type="text" placeholder="License key" style="flex:1;">
              <button id="activate-license-button" class="btn btn-secondary" type="button">激活</button>
              <button id="deactivate-license-button" class="btn btn-secondary" type="button">取消</button>
            </div>
            <div id="update-status" class="hint" style="margin-top:8px;">更新状态加载中</div>
          </details>
        </div>

      </section>

      <!-- ── Page: Editor ── -->
      <section id="editor" class="page-section">
        <!-- Search & Actions -->
        <div class="card">
          <div class="card-header">
            <h3>字幕编辑器</h3>
            <button id="load-editor-button" class="btn btn-primary" type="button" disabled><i data-lucide="list"></i> 加载</button>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <input id="editor-search-input" class="input" type="text" placeholder="搜索字幕" style="flex:1;min-width:180px;">
            <label class="checkbox-row">
              <input id="editor-issues-only" type="checkbox">
              <span>仅问题句</span>
            </label>
          </div>
        </div>

        <!-- Quality Report -->
        <div class="card">
          <div class="card-header">
            <h3>质量报告</h3>
          </div>
          <div id="quality-summary" class="hint">加载任务后显示质量报告</div>
          <div id="quality-issues"></div>
        </div>

        <!-- Bulk Replace -->
        <div class="card">
          <div class="card-header">
            <h3>批量替换</h3>
            <button id="bulk-replace-button" class="btn btn-secondary" type="button" disabled>替换</button>
          </div>
          <div style="display:flex;gap:8px;">
            <input id="bulk-source-input" class="input" type="text" placeholder="原词" style="flex:1;">
            <input id="bulk-target-input" class="input" type="text" placeholder="新词" style="flex:1;">
          </div>
        </div>

        <!-- Editor List -->
        <div class="card">
          <div class="card-header">
            <h3>字幕列表</h3>
          </div>
          <div id="editor-list"></div>
        </div>
      </section>

    </main>
  </div>

  <!-- Hidden selects for JS -->
  <select id="provider-select" style="display:none"></select>
  <select id="model-select" style="display:none"></select>

  <script src="/static/i18n.js"></script>
  <script src="/static/app.js" defer></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if (window.lucide) lucide.createIcons();
    });
  </script>
</body>
</html>
